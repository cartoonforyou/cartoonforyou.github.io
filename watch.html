        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;

            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: linear-gradient(135deg, #000, #111);
            padding: 15px 20px;
            border-bottom: 2px solid #FFD700;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header a { color: #FFD700; text-decoration: none; font-size: 18px; display: inline-flex; align-items: center; gap: 8px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #FFD700; object-fit: cover; }
        .site-title h1 { font-size: 18px; background: linear-gradient(135deg, #FFD700, #FFA500); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        
        .video-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
            border: 2px solid #FFD700;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info-section {
            background: #111;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        .info-section h1 { color: #FFD700; font-size: 28px; margin-bottom: 10px; }
        .info-section .meta { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; color: #aaa; font-size: 14px; }
        .info-section .meta span { background: #1a1a1a; padding: 5px 12px; border-radius: 20px; }
        .description { line-height: 1.6; color: #ccc; }
        
        .episodes-section { background: #111; border-radius: 16px; padding: 20px; margin: 20px 0; }
        .episodes-section h3 { color: #FFD700; margin-bottom: 15px; font-size: 20px; }
        .episodes-grid { display: flex; flex-wrap: wrap; gap: 12px; max-height: 300px; overflow-y: auto; padding: 5px; }
        .episode-btn {
            background: #1a1a1a;
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .episode-btn:hover, .episode-btn.active { background: #FFD700; color: #000; }
        
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #FFD700;
            color: #000;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #FFD700;
        }
        
        footer { background: #111; padding: 20px; text-align: center; border-top: 1px solid #FFD700; margin-top: 40px; font-size: 12px; }
        
        @media (max-width: 768px) {
            .info-section h1 { font-size: 22px; }
            .episode-btn { padding: 6px 14px; font-size: 12px; }

    function getCategoryName(c) { return c === 'anime' ? 'أنمي' : 'كرتون'; }
    function getTypeIcon(t) { return t === 'movie' ? '🎬 فيلم' : '📺 مسلسل'; }

    const urlParams = new URLSearchParams(window.location.search);
    const showId = parseInt(urlParams.get('id'));
    const show = cartoons.find(c => c.id === showId);

    if (show) {
        document.title = `${show.name} - كرتون فور يو`;
        document.getElementById('showTitle').innerText = show.name;
        document.getElementById('showCategory').innerHTML = `<i class="fas fa-tag"></i> ${getCategoryName(show.category)} • ${getTypeIcon(show.type)}`;
        document.getElementById('showYear').innerHTML = `<i class="fas fa-calendar"></i> ${show.year}`;
        document.getElementById('showDescription').innerText = show.description;
        
        const episodesGrid = document.getElementById('episodesGrid');
        let episodesData = {};
        
        // اختيار روابط المسلسل حسب المعرف
        switch(showId) {
            case 0: episodesData = adventureTimeEpisodes; break;
            case 1: episodesData = blueLockEpisodes; break;
            case 2: episodesData = demonSlayerEpisodes; break;
            case 3: episodesData = gumballEpisodes; break;
            case 4: episodesData = samuraiJackEpisodes; break;
            case 5: episodesData = batmanEpisodes; break;

            case 8: episodesData = friendsEpisodes; break;

                    const btn = document.createElement('button');
                    btn.className = 'episode-btn';
                    btn.innerHTML = `<i class="fas fa-play"></i> الحلقة ${i}`;

                        document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const videoWrapper = document.getElementById('videoWrapper');
                        videoWrapper.innerHTML = `
                            <iframe src="https://poawooptugroo.com/4/8923201" 
                                    frameborder="0" 
                                    allowfullscreen>
                            </iframe>
                        `;
                    };
                    episodesGrid.appendChild(btn);
                }
                break;
            default: episodesData = {};
        }
        
        // إذا كان المسلسل له روابط من Google Drive
        if (Object.keys(episodesData).length > 0) {
            const maxEpisode = Math.max(...Object.keys(episodesData).map(Number));
            for (let i = 1; i <= maxEpisode; i++) {
                if (episodesData[i]) {
                    const btn = document.createElement('button');
                    btn.className = 'episode-btn';
                    btn.innerHTML = `<i class="fas fa-play"></i> الحلقة ${i}`;

                        document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));

                        const videoWrapper = document.getElementById('videoWrapper');
                        videoWrapper.innerHTML = `<iframe src="${episodesData[i]}" frameborder="0" allowfullscreen></iframe>`;
                    };
                    episodesGrid.appendChild(btn);
                }
            }
        }

        if (episodesGrid.children[0]) {

        }
