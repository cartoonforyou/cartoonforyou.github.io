            left: 0;

    function getCategoryName(c) { return c === 'anime' ? 'أنمي' : 'كرتون'; }
    function getTypeIcon(t) { return t === 'movie' ? '🎬 فيلم' : '📺 مسلسل'; }

    const urlParams = new URLSearchParams(window.location.search);
    const showId = parseInt(urlParams.get('id'));
    const show = cartoons.find(c => c.id === showId);

    function renderPage() {
        if (!show) {
            window.location.href = 'index.html';
            return;
        }

        document.title = `${show.name} - كرتون فور يو`;

        const html = `
            <div class="hero-card">
                <div class="hero-image">
                    <img src="${show.img}" alt="${show.name}">
                </div>
                <div class="hero-info">
                    <h1 class="hero-title">${show.name}</h1>
                    <div class="hero-meta">
                        <span><i class="fas fa-tag"></i> ${getCategoryName(show.category)}</span>
                        <span><i class="fas fa-${show.type === 'movie' ? 'film' : 'tv'}"></i> ${getTypeIcon(show.type)}</span>
                        <span><i class="fas fa-calendar"></i> ${show.year}</span>
                        <span><i class="fas fa-star"></i> ${show.rating}</span>
                    </div>
                    <p class="hero-description">${show.description}</p>
                    <div class="hero-stats">
                        <div class="stat"><i class="fas fa-clock"></i> المدة: ${show.duration}</div>
                        <div class="stat"><i class="fas fa-hd"></i> الجودة: ${show.quality}</div>
                        <div class="stat"><i class="fas fa-list"></i> عدد الحلقات: ${Object.keys(show.episodes).length}</div>
                    </div>
                </div>
            </div>

            <div class="player-section">
                <div class="player-wrapper" id="videoWrapper">
                    <div class="player-placeholder" id="videoPlaceholder">
                        <i class="fas fa-play-circle"></i>
                        <p>اختر حلقة من القائمة أدناه للمشاهدة</p>
                    </div>
                </div>
            </div>

            <div class="episodes-section">
                <div class="episodes-header">
                    <h3><i class="fas fa-list"></i> قائمة الحلقات</h3>
                    <div class="episode-count"><i class="fas fa-play"></i> ${Object.keys(show.episodes).length} حلقة</div>
                </div>
                <div class="episodes-grid" id="episodesGrid"></div>
            </div>

            <div class="related-section">
                <div class="related-header">
                    <h3><i class="fas fa-fire"></i> قد يعجبك أيضاً</h3>
                </div>
                <div class="related-grid" id="relatedGrid"></div>
            </div>
        `;

        document.getElementById('mainContainer').innerHTML = html;

        // Build episodes grid
        const episodesGrid = document.getElementById('episodesGrid');
        const episodes = show.episodes;
        const episodeNumbers = Object.keys(episodes).map(Number).sort((a,b) => a - b);
        
        episodeNumbers.forEach((epNum, index) => {
            const card = document.createElement('div');
            card.className = 'episode-card';
            if (index === 0) card.classList.add('active');
            card.innerHTML = `
                <div class="episode-number">الحلقة ${epNum}</div>
                <div class="episode-info">
                    <h4>${show.name}</h4>
                    <p><i class="fas fa-clock"></i> ${show.duration}</p>
                </div>
                <div class="play-icon"><i class="fas fa-play"></i></div>
            `;
            card.onclick = () => {
                document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                const videoWrapper = document.getElementById('videoWrapper');
                videoWrapper.innerHTML = `<iframe src="${episodes[epNum]}" frameborder="0" allowfullscreen></iframe>`;
            };
            episodesGrid.appendChild(card);
        });

        // Auto-play first episode
        if (episodeNumbers.length > 0 && episodes[episodeNumbers[0]]) {
            const videoWrapper = document.getElementById('videoWrapper');
            videoWrapper.innerHTML = `<iframe src="${episodes[episodeNumbers[0]]}" frameborder="0" allowfullscreen></iframe>`;
        }

        // Build related shows
        const relatedGrid = document.getElementById('relatedGrid');
        const relatedShows = cartoons.filter(c => c.id !== show.id).slice(0, 6);
        
        relatedShows.forEach(related => {
            const card = document.createElement('div');
            card.className = 'related-card';
            card.innerHTML = `
                <img src="${related.img}" alt="${related.name}">
                <h4>${related.name}</h4>
            `;
            card.onclick = () => {
                window.location.href = `watch.html?id=${related.id}`;
            };
            relatedGrid.appendChild(card);
        });
    }
