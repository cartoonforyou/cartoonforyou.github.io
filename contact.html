<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - كرتون فور يو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: 'Cairo', sans-serif; color: #fff; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        h1 { color: #FFD700; font-size: 32px; margin-bottom: 20px; text-align: center; }
        p { margin-bottom: 20px; color: #ccc; text-align: center; }
        .contact-info { background: #111; border-radius: 16px; padding: 25px; margin: 25px 0; border: 1px solid #FFD700; text-align: center; }
        .contact-info i { color: #FFD700; font-size: 24px; margin-bottom: 10px; }
        .contact-info h3 { color: #FFD700; margin-bottom: 10px; }
        .contact-info a { color: #FFD700; text-decoration: none; }
        .back-home { display: inline-flex; align-items: center; gap: 8px; background: #FFD700; color: #000; padding: 10px 20px; border-radius: 40px; text-decoration: none; font-weight: bold; margin-bottom: 30px; }
        footer { text-align: center; padding: 20px; border-top: 1px solid #FFD700; margin-top: 40px; color: #aaa; font-size: 12px; }
        .note { background: rgba(255,215,0,0.1); border-radius: 12px; padding: 15px; margin-top: 20px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        
        <h1>اتصل بنا</h1>
        <p>نحن هنا للإجابة على أسئلتك واستفساراتك. يمكنك التواصل معنا عبر الوسائل التالية:</p>
        
        <div class="contact-info">
            <i class="fas fa-envelope"></i>
            <h3>البريد الإلكتروني</h3>
            <a href="mailto:cartoonforyou@example.com">cartoonforyou@example.com</a>
        </div>
        
        <div class="contact-info">
            <i class="fab fa-facebook"></i>
            <h3>فيسبوك</h3>
            <a href="#">facebook.com/cartoonforyou</a>
        </div>
        
        <div class="note">
            <i class="fas fa-info-circle"></i> ملاحظة: سيتم الرد على استفساراتكم خلال 24-48 ساعة.
        </div>
    </div>
    <footer>
        <p>© 2025 كرتون فور يو - جميع الحقوق محفوظة</p>
    </footer>
</body>
</html>
