<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- SEO Meta Tags -->
    <title>كرتون فور يو | Cartoon for You - أكبر منصة كرتون وأنمي مجانية</title>
    <meta name="description" content="كرتون فور يو - منصة مجانية تعرض أشهر برامج الكرتون والأنمي مثل قاتل الشياطين، ساموراي جاك، عالم غامبول، وقت المغامرة بجودة عالية">
    <meta name="keywords" content="كرتون فور يو, cartoon for you, كرتون, انمي, قاتل الشياطين, ساموراي جاك, عالم غامبول, وقت المغامرة">
    <meta name="author" content="Cartoon For You">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="كرتون فور يو | Cartoon for You">
    <meta property="og:description" content="منصة مجانية للكرتون والأنمي - تصفح واستمتع">
    <meta property="og:image" content="images/cartoon_for_you_gold.webp">
    <meta property="og:url" content="https://cartoonforyou.github.io/">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="كرتون فور يو | Cartoon for You">
    <meta name="twitter:description" content="منصة مجانية للكرتون والأنمي">
    <meta name="twitter:image" content="images/cartoon_for_you_gold.webp">
    
    <link rel="icon" type="image/webp" href="images/ic.webp">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --gold: #FFD700;
            --gold-dark: #DAA520;
            --shadow: rgba(255, 215, 0, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--bg-primary);
            font-family: 'Cairo', sans-serif;
            color: var(--text-primary);
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease, background-color 0.3s, color 0.3s;
        }

        body.loaded {
            opacity: 1;
        }

        header {
            background: linear-gradient(135deg, #000000, #0a0a0a);
            padding: 15px 20px;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        body.light-mode header {
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--gold);
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
        }

        .golden-title {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFA000);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-wrapper {
            flex: 1;
            max-width: 400px;
        }

        .search-container {
            display: flex;
            background: var(--bg-card);
            border-radius: 50px;
            border: 1px solid var(--gold);
            overflow: hidden;
            transition: var(--transition);
        }

        .search-container:focus-within {
            box-shadow: 0 0 15px var(--shadow);
        }

        .search-icon {
            padding: 12px 15px;
            color: var(--gold);
        }

        #searchInput {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            outline: none;
        }

        #searchInput::placeholder {
            color: var(--text-secondary);
        }

        .clear-search {
            padding: 12px 15px;
            cursor: pointer;
            color: var(--text-secondary);
            display: none;
        }

        .clear-search:hover {
            color: var(--gold);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: var(--bg-card);
            border: 1px solid var(--gold);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--gold);
            transition: var(--transition);
        }

        .icon-btn:hover {
            transform: scale(1.1);
            background: var(--gold);
            color: #000;
        }

        .categories-section {
            background: var(--bg-secondary);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            position: sticky;
            top: 92px;
            z-index: 999;
        }

        .categories-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .category-btn {
            padding: 10px 30px;
            border-radius: 50px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--text-primary);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: var(--transition);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--gold);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), transparent);
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .stat-item i {
            color: var(--gold);
            font-size: 18px;
        }

        main {
            flex: 1;
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 28px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-count {
            color: var(--text-secondary);
        }

        .filters-row {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .sort-select {
            padding: 8px 15px;
            border-radius: 25px;
            background: var(--bg-card);
            border: 1px solid var(--gold);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
        }

        .cartoon-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 220px));
            justify-content: center;
            gap: 25px;
        }

        .cartoon-list li {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
            border: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
        }

        .cartoon-list li:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px var(--shadow);
            border-color: var(--gold);
        }

        .cartoon-list li a {
            text-decoration: none;
            display: block;
        }

        .cartoon-list li img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid var(--gold);
            transition: var(--transition);
        }

        .cartoon-list li:hover img {
            transform: scale(1.02);
        }

        .cartoon-list li h3 {
            font-size: 15px;
            color: var(--gold);
            margin: 12px 0 5px;
            font-weight: 700;
        }

        .card-category {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 5px;
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 20px;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }

        .no-results i {
            font-size: 60px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gold);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            transform: scale(1.1);
        }

        footer {
            background: var(--bg-secondary);
            padding: 30px 20px;
            border-top: 2px solid var(--gold);
            margin-top: 50px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-logo img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gold);
            color: #000;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            transition: transform 0.3s;
            white-space: nowrap;
            font-size: 14px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
            }
            .search-wrapper {
                max-width: 100%;
                width: 100%;
            }
            .categories-section {
                top: 130px;
            }
            .golden-title {
                font-size: 16px;
            }
            .logo {
                width: 40px;
                height: 40px;
            }
            .cartoon-list {
                grid-template-columns: repeat(auto-fill, minmax(150px, 170px));
                gap: 15px;
            }
            .category-btn {
                padding: 8px 20px;
                font-size: 14px;
            }
            .toast {
                white-space: nowrap;
                font-size: 12px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo-area">
            <img src="images/cartoon_for_you_gold.webp" alt="شعار كرتون فور يو" class="logo">
            <h1 class="golden-title">كرتون فور يو | Cartoon For You</h1>
        </div>
        
        <div class="search-wrapper">
            <div class="search-container">
                <span class="search-icon"><i class="fas fa-search"></i></span>
                <input type="text" id="searchInput" placeholder="ابحث عن مسلسل أو فيلم...">
                <span class="clear-search" id="clearSearch"><i class="fas fa-times"></i></span>
            </div>
        </div>
        
        <div class="header-actions">
            <div class="icon-btn" id="darkModeToggle">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </div>
</header>

<div class="categories-section">
    <div class="categories-wrapper">
        <button class="category-btn active" data-category="all">
            <i class="fas fa-th-large"></i> الجميع
        </button>
        <button class="category-btn" data-category="movie">
            <i class="fas fa-film"></i> 🎬 أفلام
        </button>
        <button class="category-btn" data-category="series">
            <i class="fas fa-tv"></i> 📺 مسلسلات
        </button>
    </div>
</div>

<div class="stats-bar">
    <div class="stat-item"><i class="fas fa-film"></i> <span id="totalCount">0</span> عنوان</div>
    <div class="stat-item"><i class="fas fa-calendar"></i> <span id="lastUpdate"></span></div>
</div>

<main>
    <div class="section-header">
        <h2 class="section-title"><i class="fas fa-tv"></i> المكتبة</h2>
        <div class="result-count" id="resultCount">عرض 9 من 9</div>
    </div>
    
    <div class="filters-row">
        <select id="sortSelect" class="sort-select">
            <option value="default">🔽 الترتيب الافتراضي</option>
            <option value="name-asc">📖 أ-ي (حسب الاسم)</option>
            <option value="name-desc">📖 ي-أ (حسب الاسم)</option>
        </select>
    </div>
    
    <ul class="cartoon-list" id="cartoonList"></ul>
</main>

<footer>
    <div class="footer-content">
        <div class="footer-logo">
            <img src="images/cartoon_for_you_gold.webp" alt="logo">
            <span>كرتون فور يو</span>
        </div>
        <p>© 2025 كرتون فور يو - جميع الحقوق محفوظة</p>
        <div>
            <i class="fas fa-heart" style="color: #FFD700;"></i> شكراً لمشاهدتك
        </div>
    </div>
</footer>

<div class="back-to-top" id="backToTop">
    <i class="fas fa-arrow-up"></i>
</div>
<div id="toast" class="toast"></div>

<script>
    // ========== DATA ==========
    // ملاحظة: تم تصنيف المحتوى إلى أفلام ومسلسلات
    const cartoons = [
        { name: "انمي BLUE LOOK", nameAr: "بلو لوك", type: "series", link: "https://cartoonforyou.github.io/BlueLook.html", img: "images/blue.jpg" },
        { name: "انمي قاتل الشياطين", nameAr: "Demon Slayer", type: "series", link: "https://cartoonforyou.github.io/Demon%20Slayer.html", img: "images/قاتل.jpg" },
        { name: "عالم غامبول المدهش", nameAr: "Gumball", type: "series", link: "https://cartoonforyou.github.io/Gumball.html", img: "images/g.jpg" },
        { name: "مسلسل Batman", nameAr: "باتمان", type: "series", link: "https://cartoonforyou.github.io/batman.html", img: "images/Batman.jpg" },
        { name: "مسلسل Family Guy", nameAr: "فاملي غاي", type: "series", link: "https://cartoonforyou.github.io/index-old.html", img: "images/fg.jpg" },
        { name: "مسلسل ساموراي جاك", nameAr: "Samurai Jack", type: "series", link: "https://cartoonforyou.github.io/Samurai%20Jack.html", img: "images/sj.jpg" },
        { name: "مسلسل وقت المغامرة", nameAr: "Adventure Time", type: "series", link: "https://cartoonforyou.github.io/Adventure%20time.html", img: "images/وقت%20المغامرة.jpg" },
        { name: "مسلسل البؤساء", nameAr: "Les Misérables", type: "series", link: "https://cartoonforyou.github.io/les%20miserables.html", img: "images/مسلسل%20البؤساء.jpg" },
        { name: "مسلسل عهد الأصدقاء", nameAr: "The Era of Friends", type: "series", link: "https://cartoonforyou.github.io/the%20era%20of%20friends.html", img: "images/عهد%20الاصدقاء.jpg" }
    ];

    let currentType = "all";
    let currentSearch = "";
    let currentSort = "default";

    // ========== DOM Elements ==========
    const cartoonList = document.getElementById('cartoonList');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const darkModeToggle = document.getElementById('darkModeToggle');
    const backToTop = document.getElementById('backToTop');
    const resultCountSpan = document.getElementById('resultCount');
    const totalCountSpan = document.getElementById('totalCount');
    const sortSelect = document.getElementById('sortSelect');
    const toast = document.getElementById('toast');

    // Update last update time
    const now = new Date();
    document.getElementById('lastUpdate').innerText = now.toLocaleDateString('ar-EG');

    // ========== Helper Functions ==========
    function showToast(message) {
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function updateStats() {
        totalCountSpan.innerText = cartoons.length;
    }

    function getTypeArabic(type) {
        return type === 'movie' ? '🎬 فيلم' : '📺 مسلسل';
    }

    function filterAndSort() {
        let filtered = [...cartoons];
        
        // Filter by type (movie/series)
        if (currentType !== "all") {
            filtered = filtered.filter(c => c.type === currentType);
        }
        
        // Filter by search
        if (currentSearch) {
            const searchLower = currentSearch.toLowerCase();
            filtered = filtered.filter(c => 
                c.name.toLowerCase().includes(searchLower) || 
                c.nameAr.toLowerCase().includes(searchLower)
            );
        }
        
        // Sort
        if (currentSort === "name-asc") {
            filtered.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
        } else if (currentSort === "name-desc") {
            filtered.sort((a, b) => b.name.localeCompare(a.name, 'ar'));
        }
        
        renderCartoons(filtered);
        resultCountSpan.innerText = `عرض ${filtered.length} من ${cartoons.length} عنوان`;
        return filtered.length;
    }

    function renderCartoons(items) {
        if (items.length === 0) {
            cartoonList.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-tv-slash"></i>
                    <h3>لا توجد نتائج</h3>
                    <p>لم نعثر على محتوى مطابق لبحثك</p>
                </div>
            `;
            return;
        }
        
        cartoonList.innerHTML = items.map((item) => `
            <li>
                <a href="${item.link}" target="_blank" rel="noopener noreferrer">
                    <img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.src='images/placeholder.jpg'">
                </a>
                <h3>${item.name}</h3>
                <span class="card-category"><i class="fas ${item.type === 'movie' ? 'fa-film' : 'fa-tv'}"></i> ${getTypeArabic(item.type)}</span>
            </li>
        `).join('');
    }

    // ========== Event Listeners ==========
    searchInput.addEventListener('input', (e) => {
        currentSearch = e.target.value;
        clearSearch.style.display = currentSearch ? 'flex' : 'none';
        filterAndSort();
    });
    
    clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        currentSearch = '';
        clearSearch.style.display = 'none';
        filterAndSort();
        showToast('🔍 تم مسح البحث');
    });
    
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = btn.dataset.category;
            filterAndSort();
            const btnText = btn.innerText.trim();
            showToast(`📁 عرض: ${btnText}`);
        });
    });
    
    sortSelect.addEventListener('change', (e) => {
        currentSort = e.target.value;
        filterAndSort();
        showToast('📊 تم تغيير الترتيب');
    });
    
    // Dark Mode Toggle
    darkModeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        const icon = darkModeToggle.querySelector('i');
        if (document.body.classList.contains('light-mode')) {
            icon.classList.remove('fa-moon');
            icon.classList.add('fa-sun');
            showToast('☀️ الوضع النهاري');
        } else {
            icon.classList.remove('fa-sun');
            icon.classList.add('fa-moon');
            showToast('🌙 الوضع الليلي');
        }
        localStorage.setItem('darkMode', document.body.classList.contains('light-mode'));
    });
    
    // Load dark mode preference
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('light-mode');
        darkModeToggle.querySelector('i').classList.remove('fa-moon');
        darkModeToggle.querySelector('i').classList.add('fa-sun');
    }
    
    // Back to Top
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            backToTop.classList.add('show');
        } else {
            backToTop.classList.remove('show');
        }
    });
    
    backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        showToast('⬆️ تم العودة للأعلى');
    });
    
    // Page load animation
    window.addEventListener('load', () => {
        document.body.classList.add('loaded');
        updateStats();
        filterAndSort();
    });
</script>
</body>
</html>
