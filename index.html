    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --gold: #FFD700;
            --gold-dark: #DAA520;
            --gold-light: #FFE44D;
            --shadow: rgba(255, 215, 0, 0.25);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-gold: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
        }

        body.light-mode {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--bg-primary);
            font-family: 'Cairo', sans-serif;
            color: var(--text-primary);
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.6s ease, background-color 0.3s, color 0.3s;
        }

        body.loaded { opacity: 1; }

        /* Header */
        header {
            background: linear-gradient(135deg, #000000, #0a0a0a);
            padding: 15px 20px;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        body.light-mode header { background: linear-gradient(135deg, #ffffff, #f0f0f0); }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--gold);
            transition: var(--transition);
        }

        .logo-area:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .site-title { display: flex; flex-direction: column; }
        .golden-title {
            font-size: 20px;
            font-weight: 900;
            font-family: 'Poppins', sans-serif;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title-sub { font-size: 9px; color: var(--gold); opacity: 0.8; letter-spacing: 1px; }

        /* Search */
        .search-wrapper { flex: 1; max-width: 400px; }
        .search-container {
            display: flex;
            background: var(--bg-card);
            border-radius: 50px;
            border: 2px solid var(--gold);
            overflow: hidden;
        }
        .search-icon { padding: 10px 15px; color: var(--gold); }
        #searchInput {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }
        .clear-search { padding: 10px 15px; cursor: pointer; color: var(--text-secondary); display: none; }

        .header-actions { display: flex; gap: 10px; }
        .icon-btn {
            background: var(--bg-card);
            border: 2px solid var(--gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--gold);
        }
        .icon-btn:hover { transform: scale(1.1); background: var(--gold); color: #000; }

        /* Categories */
        .categories-section {
            background: var(--bg-secondary);
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            position: sticky;
            top: 80px;
            z-index: 999;
        }
        .categories-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .category-btn {
            padding: 6px 18px;
            border-radius: 50px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;

        .category-btn:hover, .category-btn.active {

            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        /* Hero Slider */
        .hero-section { margin: 20px auto 30px; max-width: 1400px; padding: 0 15px; }
        .section-badge { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .section-badge i { color: var(--gold); font-size: 24px; }
        .section-badge h3 { font-size: 22px; font-weight: 700; background: var(--gradient-gold); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        .slider-container {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            background: #000;
        }
        .slider { display: flex; transition: transform 0.5s ease-in-out; }
        .slide {
            min-width: 100%;
            position: relative;
            cursor: pointer;
            aspect-ratio: 16 / 9;
        }
        .slide img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
        .slide-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
            padding: 50px 40px 30px;
            border-radius: 0 0 24px 24px;
        }
        .slide-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--gold);
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .slide-info h2 { font-size: 32px; color: var(--gold); margin-bottom: 8px; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .slide-info p { font-size: 16px; color: white; opacity: 0.9; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .slide-info p i { color: var(--gold); }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: var(--gold);
            border: 2px solid var(--gold);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slider-btn:hover { background: var(--gold); color: #000; transform: translateY(-50%) scale(1.1); }
        .slider-prev { left: 20px; }
        .slider-next { right: 20px; }

        .slider-dots { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 215, 0, 0.4); cursor: pointer; }
        .dot.active { background: var(--gold); width: 30px; border-radius: 10px; }

        /* Stats */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px 15px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), transparent);
            flex-wrap: wrap;
            margin: 10px 15px;
            border-radius: 50px;
        }
        .stat-item { display: flex; align-items: center; gap: 8px; font-size: 13px; background: rgba(255, 215, 0, 0.1); padding: 5px 18px; border-radius: 50px; }
        .stat-item i { color: var(--gold); }

        /* Main */
        main { flex: 1; padding: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; padding-bottom: 10px; border-bottom: 2px dashed rgba(255, 215, 0, 0.3); }
        .section-title { font-size: 24px; font-weight: 800; background: var(--gradient-gold); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 8px; }
        .result-count { color: var(--text-secondary); font-size: 13px; background: rgba(255, 215, 0, 0.1); padding: 4px 12px; border-radius: 50px; }
        .filters-row { display: flex; gap: 10px; margin-bottom: 25px; justify-content: flex-end; }
        .sort-select { padding: 8px 15px; border-radius: 50px; background: var(--bg-card); border: 2px solid var(--gold); color: var(--text-primary); cursor: pointer; font-size: 13px; }

        /* Cards Grid */
        .cartoon-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        @media (max-width: 480px) {
            .cartoon-list { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
        @media (min-width: 768px) {
            .cartoon-list li img { height: 200px; }
            .cartoon-list { gap: 25px; grid-template-columns: repeat(auto-fill, minmax(180px, 220px)); }
        }
        .cartoon-list li {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
            border: 1px solid rgba(255, 215, 0, 0.2);
            cursor: pointer;
            position: relative;
        }
        .cartoon-list li:hover { transform: translateY(-5px); box-shadow: 0 15px 30px var(--shadow); border-color: var(--gold); }
        .cartoon-list li img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; border: 2px solid var(--gold); }
        .cartoon-list li h3 { font-size: 13px; color: var(--gold); margin: 10px 0 4px; font-weight: 700; }
        .card-category { font-size: 10px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: rgba(255, 215, 0, 0.12); border-radius: 50px; }
        .new-badge { position: absolute; top: 8px; right: 8px; background: var(--gold); color: #000; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 4px; }

        .no-results { text-align: center; padding: 40px; color: var(--text-secondary); grid-column: 1 / -1; }
        .back-to-top { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; visibility: hidden; z-index: 1000; }
        .back-to-top.show { opacity: 1; visibility: visible; }

        footer { background: var(--bg-secondary); padding: 25px 20px; border-top: 2px solid var(--gold); margin-top: 40px; }
        .footer-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; font-size: 12px; }
        .footer-logo { display: flex; align-items: center; gap: 8px; }
        .footer-logo img { width: 35px; height: 35px; border-radius: 50%; }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gold);
            color: #000;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            transition: transform 0.3s;
            font-size: 12px;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .slide-info { padding: 30px 20px 20px; }
            .slide-info h2 { font-size: 22px; }
            .slide-info p { font-size: 12px; }
            .slider-btn { width: 40px; height: 40px; font-size: 18px; }
            .slider-prev { left: 10px; }
            .slider-next { right: 10px; }
            .section-badge h3 { font-size: 18px; }
        }
        @media (max-width: 480px) {
            .slide-info { padding: 20px 15px 15px; }
            .slide-info h2 { font-size: 18px; }
            .slide-info p { font-size: 10px; }
            .slide-badge { font-size: 10px; padding: 3px 10px; }
            .slider-btn { width: 35px; height: 35px; font-size: 16px; }
        }
    </style>
</head>
<body>

<script>
    // ========== DATA (بدون روابط خارجية - تم إزالة خاصية link) ==========
    const cartoons = [
        { id: 0, name: "BLUE LOCK", nameAr: "بلو لوك", type: "series", category: "anime", img: "images/blue.jpg", isNew: true, year: "2024", description: "أنمي رياضي مثير عن كرة القدم. قصة آيساغي يويتشي الذي يسعى ليصبح أفضل مهاجم في العالم." },
        { id: 1, name: "قاتل الشياطين", nameAr: "Demon Slayer", type: "series", category: "anime", img: "images/قاتل.jpg", isNew: true, year: "2024", description: "أنمي أكشن خارق عن محاربة الشياطين. قصة تانجيرو كامادو الذي يسعى لإنقاذ أخته نيزوكو." },
        { id: 2, name: "عالم غامبول المدهش", nameAr: "Gumball", type: "series", category: "cartoon", img: "images/g.jpg", isNew: false, year: "2023", description: "كرتون كوميدي ممتع للعائلة. مغامرات غامبال واتربسون وأخيه داروين." },
        { id: 3, name: "باتمان", nameAr: "Batman", type: "series", category: "cartoon", img: "images/Batman.jpg", isNew: false, year: "2022", description: "مغامرات فارس الظلام في مدينة جوثام. سلسلة كرتونية كلاسيكية." },
        { id: 4, name: "فاملي غاي", nameAr: "Family Guy", type: "series", category: "cartoon", img: "images/fg.jpg", isNew: false, year: "2023", description: "كرتون كوميدي للكبار. قصة عائلة غريفين ومغامراتهم الطريفة." },
        { id: 5, name: "ساموراي جاك", nameAr: "Samurai Jack", type: "series", category: "cartoon", img: "images/sj.jpg", isNew: false, year: "2022", description: "مغامرات الساموراي جاك في المستقبل. قصة انتقام من الشرير أكو." },
        { id: 6, name: "وقت المغامرة", nameAr: "Adventure Time", type: "series", category: "cartoon", img: "images/وقت%20المغامرة.jpg", isNew: false, year: "2023", description: "مغامرات فيني وجيك في أرض أوو. كرتون مغامرات كوميدي." },
        { id: 7, name: "البؤساء", nameAr: "Les Misérables", type: "series", category: "anime", img: "images/مسلسل%20البؤساء.jpg", isNew: false, year: "2021", description: "قصة درامية مؤثرة مقتبسة من رواية فيكتور هوغو الشهيرة." },
        { id: 8, name: "عهد الأصدقاء", nameAr: "The Era of Friends", type: "series", category: "anime", img: "images/عهد%20الاصدقاء.jpg", isNew: false, year: "2022", description: "قصة صداقة ووفاء بين مجموعة من الأصدقاء في رحلة حياتية." }
    ];

    const sliderItems = cartoons.filter(c => c.isNew);
    let currentType = "all", currentSearch = "", currentSort = "default", currentSlide = 0, autoSlideInterval;

    function getCategoryIcon(c) { return c === 'anime' ? '🇯🇵' : '🇺🇸'; }
    function getCategoryName(c) { return c === 'anime' ? 'أنمي' : 'كرتون'; }
    function getTypeIcon(t) { return t === 'movie' ? '🎬 فيلم' : '📺 مسلسل'; }

    function updateStats() {
        document.getElementById('totalCount').innerText = cartoons.length;
        document.getElementById('animeCount').innerText = cartoons.filter(c => c.category === 'anime').length;
        document.getElementById('lastUpdate').innerText = new Date().toLocaleDateString('ar-EG');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function buildSlider() {
        document.getElementById('slider').innerHTML = sliderItems.map(item => `
            <div class="slide" data-id="${item.id}">
                <img src="${item.img}" alt="${item.name}">
                <div class="slide-info">
                    <span class="slide-badge"><i class="fas fa-star"></i> جديد ${item.year}</span>
                    <h2>${item.name}</h2>
                    <p><i class="fas fa-tag"></i> ${getCategoryName(item.category)} • ${getTypeIcon(item.type)}</p>
                    <p><i class="fas fa-info-circle"></i> ${item.description.substring(0, 80)}...</p>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.slide').forEach(slide => {
            slide.addEventListener('click', () => {
                const id = parseInt(slide.dataset.id);
                window.location.href = `watch.html?id=${id}`;
            });
        });
        
        document.getElementById('sliderDots').innerHTML = sliderItems.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" data-dot-index="${i}"></div>`).join('');
        document.querySelectorAll('.dot').forEach(dot => dot.addEventListener('click', () => { goToSlide(parseInt(dot.dataset.dotIndex)); resetAutoSlide(); }));
    }

    function goToSlide(i) { currentSlide = i; document.getElementById('slider').style.transform = `translateX(-${currentSlide * 100}%)`; document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === currentSlide)); }
    function nextSlide() { goToSlide((currentSlide + 1) % sliderItems.length); }
    function prevSlide() { goToSlide((currentSlide - 1 + sliderItems.length) % sliderItems.length); }
    function startAutoSlide() { autoSlideInterval = setInterval(nextSlide, 5000); }
    function resetAutoSlide() { clearInterval(autoSlideInterval); startAutoSlide(); }
    
    function filterAndSort() {
        let filtered = cartoons.filter(c => currentType === "all" || c.type === currentType);
        if (currentSearch) filtered = filtered.filter(c => c.name.toLowerCase().includes(currentSearch.toLowerCase()) || c.nameAr.toLowerCase().includes(currentSearch.toLowerCase()));
        if (currentSort === "name-asc") filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if (currentSort === "name-desc") filtered.sort((a,b) => b.name.localeCompare(a.name));
        
        document.getElementById('cartoonList').innerHTML = filtered.map(item => `
            <li data-id="${item.id}">
                ${item.isNew ? '<span class="new-badge"><i class="fas fa-star"></i> جديد</span>' : ''}
                <img src="${item.img}" alt="${item.name}">
                <h3>${item.name}</h3>
                <div class="card-category">${getCategoryIcon(item.category)} ${getCategoryName(item.category)} • ${getTypeIcon(item.type)}</div>
            </li>
        `).join('');
        
        document.querySelectorAll('.cartoon-list li').forEach(li => {
            li.addEventListener('click', () => {
                const id = parseInt(li.dataset.id);
                window.location.href = `watch.html?id=${id}`;
            });
        });
        
        document.getElementById('resultCount').innerText = `عرض ${filtered.length} من ${cartoons.length} عنوان`;
    }

    document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value; document.getElementById('clearSearch').style.display = currentSearch ? 'flex' : 'none'; filterAndSort(); });
    document.getElementById('clearSearch').addEventListener('click', () => { document.getElementById('searchInput').value = ''; currentSearch = ''; document.getElementById('clearSearch').style.display = 'none'; filterAndSort(); showToast('🔍 تم مسح البحث'); });
    document.querySelectorAll('.category-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentType = btn.dataset.category; filterAndSort(); showToast(`📁 عرض: ${btn.innerText.trim()}`); }));
    document.getElementById('sortSelect').addEventListener('change', (e) => { currentSort = e.target.value; filterAndSort(); showToast('📊 تم تغيير الترتيب'); });
    document.getElementById('sliderPrev').addEventListener('click', () => { prevSlide(); resetAutoSlide(); });
    document.getElementById('sliderNext').addEventListener('click', () => { nextSlide(); resetAutoSlide(); });
    document.querySelector('.slider-container').addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
    document.querySelector('.slider-container').addEventListener('mouseleave', startAutoSlide);
    
    document.getElementById('darkModeToggle').addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        const icon = document.getElementById('darkModeToggle').querySelector('i');
        if (document.body.classList.contains('light-mode')) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); showToast('☀️ الوضع النهاري'); }
        else { icon.classList.remove('fa-sun'); icon.classList.add('fa-moon'); showToast('🌙 الوضع الليلي'); }
        localStorage.setItem('darkMode', document.body.classList.contains('light-mode'));
    });
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('light-mode');
    
    window.addEventListener('scroll', () => document.getElementById('backToTop').classList.toggle('show', window.scrollY > 300));
    document.getElementById('backToTop').addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); showToast('⬆️ تم العودة للأعلى'); });
    
    window.addEventListener('load', () => { document.body.classList.add('loaded'); updateStats(); buildSlider(); startAutoSlide(); filterAndSort(); });
</script>
</body>
</html>
